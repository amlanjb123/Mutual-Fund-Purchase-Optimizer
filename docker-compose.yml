services:

  backend:
    build:
      context: ./Backend/MF_Purchase_Optimizer_BE
      dockerfile: Dockerfile
    image: docker-fastapi:latest
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: ./Frontend/MF_Purchase_Optimizer_FE
      dockerfile: Dockerfile
    image: my-react-app:latest
    container_name: frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend